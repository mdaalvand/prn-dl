name: Search Download

on:
  workflow_dispatch:
    inputs:
      query:
        description: Search query
        required: true
        type: string
      site:
        description: Provider site
        required: false
        default: pornhub
        type: choice
        options: [pornhub, boyfriendtv, onlygayvideo]
      limit:
        description: Number of videos to download
        required: false
        default: "10"
        type: string
      pool_size:
        description: Candidate pool size
        required: false
        default: "100"
        type: string
      mode:
        description: Selection mode
        required: false
        default: top
        type: choice
        options: [top, random]
      seed:
        description: Random seed (optional)
        required: false
        default: ""
        type: string
      orientation:
        description: Orientation
        required: false
        default: gay
        type: choice
        options: [gay, lesbian, straight, transgender]
      quality:
        description: Download quality
        required: false
        default: "480"
        type: choice
        options: ["360", "480", "720", "1080", "1440", "2160"]
      order:
        description: Sort order
        required: false
        default: most_relevant
        type: choice
        options: [most_relevant, most_viewed, top_rated, newest, hottest]
      period:
        description: Period
        required: false
        default: alltime
        type: choice
        options: [daily, weekly, monthly, alltime]
      category:
        description: Category include (id)
        required: false
        default: ""
        type: string
      exclude_category:
        description: Category exclude (ids like 5-90)
        required: false
        default: ""
        type: string
      min_duration:
        description: Min duration in seconds
        required: false
        default: ""
        type: string
      max_duration:
        description: Max duration in seconds
        required: false
        default: ""
        type: string
      min_quality:
        description: Minimum quality (e.g. 720)
        required: false
        default: ""
        type: string
      hd_only:
        description: HD only
        required: false
        default: false
        type: boolean
      min_views:
        description: Minimum views
        required: false
        default: ""
        type: string
      output_dir:
        description: Output directory
        required: false
        default: downloads
        type: string
      timeout:
        description: HTTP timeout seconds (download timeout scales automatically)
        required: false
        default: "45"
        type: string

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      QUERY: ${{ inputs.query }}
      SITE: ${{ inputs.site }}
      LIMIT: ${{ inputs.limit }}
      POOL_SIZE: ${{ inputs.pool_size }}
      MODE: ${{ inputs.mode }}
      SEED: ${{ inputs.seed }}
      ORIENTATION: ${{ inputs.orientation }}
      QUALITY: ${{ inputs.quality }}
      ORDER: ${{ inputs.order }}
      PERIOD: ${{ inputs.period }}
      CATEGORY: ${{ inputs.category }}
      EXCLUDE_CATEGORY: ${{ inputs.exclude_category }}
      MIN_DURATION: ${{ inputs.min_duration }}
      MAX_DURATION: ${{ inputs.max_duration }}
      MIN_QUALITY: ${{ inputs.min_quality }}
      HD_ONLY: ${{ inputs.hd_only }}
      MIN_VIEWS: ${{ inputs.min_views }}
      OUTPUT_DIR: ${{ inputs.output_dir }}
      TIMEOUT: ${{ inputs.timeout }}
      PHFETCH_COOKIE: ${{ secrets.PHFETCH_COOKIE }}
      PHFETCH_PROXY: ${{ secrets.PHFETCH_PROXY }}
      RELEASE_TAG: search-download-${{ github.run_id }}-${{ github.run_attempt }}
      RELEASE_NAME: Search Download ${{ github.run_id }}.${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Search and Download
        id: run_cmd
        shell: bash
        continue-on-error: true
        run: |
          set -euo pipefail
          cmd=(phfetch download --site "$SITE" --query "$QUERY" --limit "$LIMIT" --pool-size "$POOL_SIZE" --mode "$MODE" --orientation "$ORIENTATION" --order "$ORDER" --period "$PERIOD" --quality "$QUALITY" --output "$OUTPUT_DIR" --timeout "$TIMEOUT" --json)
          [[ -n "$SEED" ]] && cmd+=(--seed "$SEED")
          [[ -n "$CATEGORY" ]] && cmd+=(--category "$CATEGORY")
          [[ -n "$EXCLUDE_CATEGORY" ]] && cmd+=(--exclude-category "$EXCLUDE_CATEGORY")
          [[ -n "$MIN_DURATION" ]] && cmd+=(--min-duration "$MIN_DURATION")
          [[ -n "$MAX_DURATION" ]] && cmd+=(--max-duration "$MAX_DURATION")
          [[ -n "$MIN_QUALITY" ]] && cmd+=(--min-quality "$MIN_QUALITY")
          [[ -n "$MIN_VIEWS" ]] && cmd+=(--min-views "$MIN_VIEWS")
          [[ "$HD_ONLY" == "true" ]] && cmd+=(--hd-only)

          set +e
          "${cmd[@]}" \
            > >(tee command-output.log) \
            2> >(tee command-stderr.log >&2)
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Build Release Metadata
        if: always()
        shell: bash
        env:
          RUN_EXIT_CODE: ${{ steps.run_cmd.outputs.exit_code }}
          OUTPUT_DIR_ENV: ${{ env.OUTPUT_DIR }}
          QUERY_ENV: ${{ env.QUERY }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from json import JSONDecodeError, JSONDecoder
          from pathlib import Path

          output_path = Path("command-output.log")
          stderr_path = Path("command-stderr.log")
          output_dir = Path(os.getenv("OUTPUT_DIR_ENV", "downloads"))
          run_exit_code = os.getenv("RUN_EXIT_CODE", "")
          query_value = os.getenv("QUERY_ENV", "")

          def parse_json_values(text: str):
              values = []
              decoder = JSONDecoder()
              i = 0
              n = len(text)
              while i < n:
                  while i < n and text[i].isspace():
                      i += 1
                  if i >= n:
                      break
                  try:
                      value, end = decoder.raw_decode(text, i)
                  except JSONDecodeError:
                      i += 1
                      continue
                  values.append(value)
                  i = end
              return values

          def esc(value: str) -> str:
              return value.replace("|", "\\|").replace("\n", " ").strip()

          raw = output_path.read_text(encoding="utf-8") if output_path.exists() else ""
          values = parse_json_values(raw)

          videos = []
          for value in values:
              if isinstance(value, list):
                  videos = value
                  break

          result = {
              "succeeded": [],
              "failed": [],
              "failure_reasons": {},
              "download_context": {},
          }
          for value in reversed(values):
              if isinstance(value, dict) and "succeeded" in value and "failed" in value:
                  result = value
                  break

          Path("search_results.json").write_text(
              json.dumps(videos, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          Path("download_result.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          succeeded = set(result.get("succeeded", []))
          failed = set(result.get("failed", []))

          rows = ["| # | Title | URL | Status |", "|---|---|---|---|"]
          if videos:
              for idx, video in enumerate(videos, start=1):
                  title = esc(str(video.get("title") or "-"))
                  url = str(video.get("url") or "")
                  if url in succeeded:
                      status = "downloaded"
                  elif url in failed:
                      status = "failed"
                  else:
                      status = "not_attempted"
                  rows.append(f"| {idx} | {title} | {esc(url)} | {status} |")
          else:
              all_urls = list(dict.fromkeys(result.get("succeeded", []) + result.get("failed", [])))
              if all_urls:
                  for idx, url in enumerate(all_urls, start=1):
                      status = "downloaded" if url in succeeded else "failed"
                      rows.append(f"| {idx} | - | {esc(url)} | {status} |")
              else:
                  rows.append("| 1 | (no video parsed from output) | - | unknown |")

          asset_rows = ["| File | Size (MB) |", "|---|---|"]
          assets = []
          if output_dir.exists() and output_dir.is_dir():
              for file in sorted(output_dir.rglob("*")):
                  if file.is_file() and file.stat().st_size > 0:
                      size_mb = file.stat().st_size / (1024 * 1024)
                      rel_name = file.relative_to(output_dir)
                      assets.append((str(rel_name), size_mb))
          if assets:
              for name, size_mb in assets:
                  asset_rows.append(f"| {esc(name)} | {size_mb:.2f} |")
          else:
              asset_rows.append("| (no downloadable media file) | 0.00 |")

          summary = [
              "# Search Download Result",
              "",
              f"- Query: `{esc(query_value)}`",
              f"- Command exit code: `{run_exit_code}`",
              f"- Succeeded: **{len(result.get('succeeded', []))}**",
              f"- Failed: **{len(result.get('failed', []))}**",
              "",
              "## Video Table",
              "",
              *rows,
              "",
              "## Release Assets",
              "",
              *asset_rows,
              "",
              "## Logs",
              "",
              "- `command-output.log`",
              "- `command-stderr.log`",
              "- `search_results.json`",
              "- `download_result.json`",
          ]
          Path("release_notes.md").write_text("\n".join(summary) + "\n", encoding="utf-8")

          if not stderr_path.exists():
              stderr_path.write_text("", encoding="utf-8")
          PY

      - name: Create Release
        if: always()
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body_path: release_notes.md
          fail_on_unmatched_files: false
          files: |
            ${{ env.OUTPUT_DIR }}/**
            command-output.log
            command-stderr.log
            search_results.json
            download_result.json
            release_notes.md

      - name: Fail Job If Download Failed
        if: always() && steps.run_cmd.outputs.exit_code != '0'
        run: |
          echo "download command failed with exit code ${{ steps.run_cmd.outputs.exit_code }}"
          exit 1
